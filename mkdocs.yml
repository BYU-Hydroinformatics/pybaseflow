site_name: baseflowx
site_url: https://baseflowx.readthedocs.io/en/latest/
site_description: Documentation for the baseflowx Python Package
site_author: Norm Jones
repo_url: https://github.com/BYU-Hydroinformatics/baseflowx/
copyright: Copyright &copy; 2025 Norman L. Jones. Licensed under MIT.
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js
  - js/mathjax-config.js
markdown_extensions:
    - attr_list
    - sane_lists
    - md_in_html
    - admonition
    - pymdownx.arithmatex:
        generic: true
theme: readthedocs
extra_css:
  - css/custom.css
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_signature_annotations: false
nav:
  - Home: index.md
  - Installation: installation.md
  - Web App: webapp.md
  - Methods:
    - Overview: methods/overview.md
    - Recursive Digital Filters: methods/digital-filters.md
    - Graphical and Recession Methods: methods/graphical-methods.md
    - Tracer-Based Methods: methods/tracer-methods.md
    - Recession Analysis: methods/recession-analysis.md
  - Guides:
    - Parameter Estimation: guides/parameter-estimation.md
    - USGS Data Retrieval: guides/usgs-data.md
    - CMB Calibration Bridge: guides/cmb-calibration.md
  - API Reference: api.md
