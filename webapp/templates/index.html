<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baseflow Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header>
    <h1>Baseflow Explorer</h1>
    <span class="subtitle">Powered by <a href="https://pypi.org/project/baseflowx/" target="_blank" rel="noopener">baseflowx</a> v{{ version }}</span>
    <a class="repo-link" href="https://github.com/BYU-Hydroinformatics/baseflowx" target="_blank" rel="noopener">GitHub</a>
  </header>

  <main>
    <div id="workspace">
      <div id="map"></div>

      <section id="analysis-panel" class="hidden" aria-label="Analysis">
        <div class="analysis-header">
          <span id="analysis-title">Analysis</span>
          <div class="analysis-actions">
            <button id="toggle-yaxis" class="icon-btn" title="Toggle linear/log y-axis" aria-label="Toggle log">log</button>
            <button id="expand-analysis" class="icon-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen">⤢</button>
            <button id="close-analysis" class="icon-btn" title="Close" aria-label="Close analysis">×</button>
          </div>
        </div>
        <div class="analysis-body">
          <div id="chart"></div>
        </div>
      </section>
    </div>

    <aside id="panel" class="hidden">
      <button class="close-btn" aria-label="Close">&times;</button>
      <h2 id="site-title">—</h2>
      <div id="site-meta"></div>

      <form id="analyze-form">
        <div class="row">
          <label>Start date<input type="date" name="start" required></label>
          <label>End date<input type="date" name="end" required></label>
        </div>

        <label>Drainage area (km²)
          <input type="number" name="area" min="1" step="1" value="500">
        </label>

        <fieldset>
          <legend>Methods</legend>
          <div class="method-grid">
            {% for key, m in methods.items() %}
            <label><input type="checkbox" name="method" value="{{ key }}"
              {% if key in ['lh', 'eckhardt', 'chapman_maxwell', 'ukih', 'part'] %}checked{% endif %}>
              {{ m.label }}</label>
            {% endfor %}
          </div>
        </fieldset>

        <details>
          <summary>Filter parameters</summary>
          <label>Lyne-Hollick β
            <input type="number" name="beta" min="0.5" max="0.99" step="0.005" value="0.925">
          </label>
          <label>Recession coefficient a
            <input type="number" name="a_coef" min="0.5" max="0.999" step="0.005" value="0.925">
          </label>
          <label>Eckhardt BFImax
            <input type="number" name="bfi_max" min="0.1" max="0.95" step="0.05" value="0.80">
          </label>
        </details>

        <div id="status"></div>
      </form>

      <div id="results" class="hidden">
        <div id="summary"></div>
        <div id="bfi-panel"></div>
        <button id="download-csv" class="hidden">Download CSV</button>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script>
    window.METHOD_LABELS = {
      {% for key, m in methods.items() %}{{ key|tojson }}: {{ m.label|tojson }}{% if not loop.last %},{% endif %}
      {% endfor %}
    };
  </script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
